{% extends "base.html" %}
{% block title %}Вход — TimeSheet Auto{% endblock %}

{% block content %}
<div class="login-wrap">

  <div class="login-logo">
    <h4>TimeSheet Auto</h4>
    <p>Введите корпоративные учётные данные</p>
  </div>

  <form method="post" action="{{ url_for('login') }}">

    <div class="card mb-4">
      <div class="card-header">Active Directory</div>
      <div class="card-body">
        {% if ad_server %}
          <p class="small text-muted mb-3 font-monospace">{{ ad_server }}</p>
        {% endif %}
        <div class="mb-3">
          <label class="form-label">Логин</label>
          <input type="text" name="ad_user" class="form-control"
                 placeholder="user@company.ru"
                 value="{{ request.form.get('ad_user', '') }}" required autofocus>
        </div>
        <div class="mb-0">
          <label class="form-label">Пароль</label>
          <input type="password" name="ad_password" class="form-control" required>
        </div>
      </div>
    </div>

    <div class="d-grid">
      <button type="submit" class="btn btn-primary">Войти</button>
    </div>

  </form>
</div>
{% endblock %}
